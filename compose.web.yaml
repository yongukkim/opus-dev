# Run OPUS web on EC2 (host port 80 <- container 3000). Matches Terraform security group.
# 로컬 빌드: docker compose -f compose.web.yaml up --build -d
# 레지스트리 이미지 사용: OPUS_WEB_IMAGE=ghcr.io/yongukkim/opus-web:latest docker compose -f compose.web.yaml up -d
#
# ISO 27001 A.10.1.1 / A.9.4.1:
#   KO: DB 비밀은 이미지에 굽지 않고 EC2 호스트의 /etc/opus/opus.env 에서 런타임 주입한다.
#   JA: DBシークレットはイメージに焼かず、/etc/opus/opus.env からランタイム注入する。
#   EN: DB secrets are injected at runtime from /etc/opus/opus.env, never baked in.
services:
  opus-web:
    image: ${OPUS_WEB_IMAGE:-opus-web:local}
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: missing
    ports:
      - "80:3000"
    environment:
      NODE_ENV: production
    # /etc/opus/opus.env 는 write-ec2-env.sh 로 EC2 에 0640 권한으로 배포된다.
    # 로컬 개발(docker compose up)에서 파일이 없어도 compose 가 실패하지 않도록 required: false.
    env_file:
      - path: /etc/opus/opus.env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
