# OPUS storefront EC2 — Caddy (443) → opus-web :3000 only. Console runs on a separate host (compose.console.yaml).
# 로컬 빌드: docker compose -f compose.web.yaml up --build -d
# 레지스트리: OPUS_WEB_IMAGE 환경변수로 태그 지정 (scripts/ec2-pull-restart.sh).
#
# ISO 27001 A.10.1.1 / A.9.4.1 / A.13.1.3 (CLAUDE.md §3, §6):
#   KO: DB 비밀은 이미지에 굽지 않고 EC2 호스트의 /etc/opus/opus.env 에서 런타임 주입한다.
#       외부 노출은 Caddy 가 443/80 으로만 받고 opus-web 은 컨테이너 네트워크 안에만 노출한다.
#   JA: DBシークレットはイメージに焼かず、/etc/opus/opus.env からランタイム注入する。
#       外部公開はCaddyが443/80のみで受け、opus-webはコンテナネットワーク内部のみで露出する。
#   EN: DB secrets are injected at runtime from /etc/opus/opus.env, never baked in.
#       Public traffic enters only through Caddy on 443/80; the app stays on the internal network.
#
# Staging / internal demo (no KOMOJU): set in /etc/opus/opus.env
#   OPUS_DEMO_PRIMARY_PURCHASE=true
# so collector “demo pay” on submission checkout records JSONL custody on /purchase/success.
# Do not enable on public production without operator approval.

services:
  opus-web:
    image: ${OPUS_WEB_IMAGE:-opus-web:local}
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: missing
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      # ISO 27001 A.9.4.2 (§2) — OAuth CSRF / redirect base must match the storefront public origin (Caddy host).
      # KO: 공유 opus.env 에 콘솔용 AUTH_URL 이 있어도 스토어는 app 호스트로 고정한다.
      # JA: 共有 opus.env にコンソール用 AUTH_URL があっても、ストアは app ホストに固定する。
      # EN: Pin storefront OAuth base to the app host even if shared opus.env sets console AUTH_URL.
      # Local: AUTH_URL_WEB=http://localhost:3000 docker compose -f compose.web.yaml up -d
      AUTH_URL: ${AUTH_URL_WEB:-https://app.opus-store.com}
    env_file:
      - path: /etc/opus/opus.env
        required: false
    volumes:
      - opus_storage:/app/storage
      - opus_storage:/app/apps/web/storage
      - opus_artworks:/app/apps/web/public/local-artworks
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      opus-web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  caddy_data:
  caddy_config:
  opus_storage:
  opus_artworks:
