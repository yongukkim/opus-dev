# Run OPUS web on EC2 (Caddy edge :80/:443 -> opus-web :3000).
# 로컬 빌드: docker compose -f compose.web.yaml up --build -d
# 레지스트리 이미지 사용: OPUS_WEB_IMAGE=ghcr.io/yongukkim/opus-web:latest docker compose -f compose.web.yaml up -d
#   * EC2 ~/opus-dev/.env 파일에 OPUS_WEB_IMAGE 한 줄을 두면 force-recreate 시에도 옛 로컬 이미지로 회귀하지 않는다.
#
# ISO 27001 A.10.1.1 / A.9.4.1 / A.13.1.3 (CLAUDE.md §3, §6):
#   KO: DB 비밀은 이미지에 굽지 않고 EC2 호스트의 /etc/opus/opus.env 에서 런타임 주입한다.
#       외부 노출은 Caddy 가 443/80 으로만 받고 opus-web 은 컨테이너 네트워크 안에만 노출한다.
#   JA: DBシークレットはイメージに焼かず、/etc/opus/opus.env からランタイム注入する。
#       外部公開はCaddyが443/80のみで受け、opus-webはコンテナネットワーク内部のみで露出する。
#   EN: DB secrets are injected at runtime from /etc/opus/opus.env, never baked in.
#       Public traffic enters only through Caddy on 443/80; opus-web stays on the internal network.
services:
  opus-web:
    image: ${OPUS_WEB_IMAGE:-opus-web:local}
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: missing
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    # /etc/opus/opus.env 는 write-ec2-env.sh 로 EC2 에 0640 권한으로 배포된다.
    # 로컬 개발(docker compose up)에서 파일이 없어도 compose 가 실패하지 않도록 required: false.
    env_file:
      - path: /etc/opus/opus.env
        required: false
    volumes:
      - opus_storage:/app/storage
      - opus_storage:/app/apps/web/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      opus-web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  # 인증서·ACME 계정 영구 저장소. 컨테이너 재기동/이미지 갱신에도 유지되어 Let's Encrypt rate-limit 회피.
  caddy_data:
  caddy_config:
  # 작품 원본/파생 파일·jsonl 저장소. 웹 컨테이너 재배포 후에도 보존.
  # 호스트에서 root 로 시드한 뒤 append 가 막히면 `scripts/ec2-chown-web-storage.sh` 실행.
  opus_storage:
