name: build-and-deploy-web

on:
  push:
    branches:
      - main
      - feat/signup-sso-collector
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "Dockerfile"
      - ".dockerignore"
      - "compose.web.yaml"
      - "infra/caddy/**"
      - "scripts/ec2-pull-restart.sh"
      - "scripts/ec2-free-disk-for-deploy.sh"
      - "scripts/ec2-ghcr-login.sh"
      - "scripts/backup-opus-storage.sh"
      - "scripts/ops-caddy-reload.sh"
      - "scripts/ops-diagnose-edge.sh"
      - "scripts/ec2-chown-web-storage.sh"
      - "scripts/ops-web-stability-check.sh"
      - "scripts/ops-release-e2e-check.sh"
      - ".github/workflows/build-web-image.yml"
  workflow_dispatch: {}

concurrency:
  group: opus-ec2-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: meta
        run: |
          img="ghcr.io/${{ steps.owner.outputs.value }}/opus-web"
          short="${GITHUB_SHA::7}"
          ref="${GITHUB_REF_NAME//\//-}"
          echo "tags=$img:$short,$img:$ref,$img:latest" >> "$GITHUB_OUTPUT"
          echo "image_ref=$img:$short" >> "$GITHUB_OUTPUT"

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: ${{ vars.DEPLOY_WEB_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    # ISO 27001 A.9.4.2 — deploy job token is separate from build; GHCR pull on EC2 needs packages:read.
    permissions:
      contents: read
      packages: read
    steps:
      # 새 EC2(AMI만 깔린 머신)에는 Docker가 없을 수 있음 — 한 번 설치 후 다음 SSH에서 배포.
      - name: Ensure Docker on EC2 (fresh host)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script_stop: true
          script: |
            bash -lc 'set -eo pipefail
            if command -v docker >/dev/null 2>&1; then echo "[deploy-web] docker binary already present"; else curl -fsSL https://get.docker.com | sudo sh; fi
            sudo usermod -aG docker "$(whoami)" || true
            echo "[deploy-web] docker ready (deploy step uses a new SSH session so docker group applies)"'

      # drone-ssh (appleboy/ssh-action) 의 multiline script 가 본 환경에서
      # docker login 직후 침묵 종료되는 이슈가 있어, 원격 스크립트는
      # 미리 EC2 에 clone 된 scripts/ec2-pull-restart.sh 하나로 일원화한다.
      - name: SSH into EC2 and redeploy stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 20m
          script_stop: true
          script: |
            bash -lc 'set -eo pipefail; IMG="${{ needs.build-and-push.outputs.image_ref }}"; BR="${{ github.ref_name }}"; APP="$HOME/opus-dev"; echo "[deploy-web] web=$IMG br=$BR"; docker system prune -af 2>/dev/null || sudo docker system prune -af || true; sudo find /var/backups/opus-storage -type f -name "opus-storage-*.tgz" 2>/dev/null | sort | head -n -1 | xargs -r sudo rm -f || true; rm -rf "$HOME/.cache"/* 2>/dev/null || true; df -h /; if [ ! -d "$APP/.git" ]; then if [ -d "$APP" ]; then rm -rf "$APP"; fi; git clone --depth 1 --branch "$BR" "https://github.com/${{ github.repository }}.git" "$APP"; fi; git -C "$APP" config --unset-all remote.origin.fetch || true; git -C "$APP" config --add remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"; git -C "$APP" fetch --depth 1 origin "+$BR:refs/remotes/origin/$BR"; git -C "$APP" checkout -B "$BR" "origin/$BR"; GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}" GHCR_USER="${{ github.actor }}" OPUS_WEB_IMAGE="$IMG" BRANCH="$BR" APP_DIR="$APP" bash "$APP/scripts/ec2-pull-restart.sh"'
