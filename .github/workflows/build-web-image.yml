name: build-and-deploy-web

on:
  push:
    branches:
      - main
      - feat/signup-sso-collector
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "Dockerfile"
      - ".dockerignore"
      - "compose.web.yaml"
      - "scripts/ec2-pull-restart.sh"
      - ".github/workflows/build-web-image.yml"
  workflow_dispatch: {}

concurrency:
  group: build-and-deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: meta
        run: |
          img="ghcr.io/${{ steps.owner.outputs.value }}/opus-web"
          short="${GITHUB_SHA::7}"
          ref="${GITHUB_REF_NAME//\//-}"
          echo "tags=$img:$short,$img:$ref,$img:latest" >> "$GITHUB_OUTPUT"
          echo "image_ref=$img:$short" >> "$GITHUB_OUTPUT"

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: ${{ vars.DEPLOY_WEB_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and redeploy container
        uses: appleboy/ssh-action@v1.2.0
        env:
          OPUS_WEB_IMAGE: ${{ needs.build-and-push.outputs.image_ref }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_BRANCH: ${{ github.ref_name }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: OPUS_WEB_IMAGE,GHCR_USER,GHCR_TOKEN,REPO_BRANCH
          script_stop: true
          script: |
            set -euo pipefail
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            APP_DIR="$HOME/opus-dev"
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone --depth 1 --branch "$REPO_BRANCH" https://github.com/yongukkim/opus-dev.git "$APP_DIR"
            else
              git -C "$APP_DIR" fetch --depth 1 origin "$REPO_BRANCH"
              git -C "$APP_DIR" checkout "$REPO_BRANCH"
              git -C "$APP_DIR" reset --hard "origin/$REPO_BRANCH"
            fi
            cd "$APP_DIR"
            export OPUS_WEB_IMAGE
            docker pull "$OPUS_WEB_IMAGE"
            docker compose -f compose.web.yaml up -d
            docker compose -f compose.web.yaml ps
