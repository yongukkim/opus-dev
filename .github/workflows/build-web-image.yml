name: build-web-image

on:
  push:
    branches:
      - main
      - feat/signup-sso-collector
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/build-web-image.yml"
  workflow_dispatch: {}

concurrency:
  group: build-web-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: meta
        run: |
          img="ghcr.io/${{ steps.owner.outputs.value }}/opus-web"
          echo "image=$img" >> "$GITHUB_OUTPUT"
          short="${GITHUB_SHA::7}"
          ref="${GITHUB_REF_NAME//\//-}"
          echo "tags=$img:$short,$img:$ref,$img:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
