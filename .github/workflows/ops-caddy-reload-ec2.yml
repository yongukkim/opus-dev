# ISO 27001 A.10.1.1 / A.13.1.3 (CLAUDE.md §3, §6) — TLS edge must match published hostnames without shipping keys in the repo.
# KO: 이미지 빌드 없이 EC2에서 최신 Caddyfile을 반영·reload하여 LE 인증서를 유도한다(앱·콘솔 호스트 각각).
# JA: イメージビルドなしでEC2の最新Caddyfileを反映・reloadし、LE証明書を促す（アプリ・コンソール各ホスト）。
# EN: No image build: sync Caddyfile and reload Caddy on each EC2 role for Let's Encrypt refresh.

name: ops-caddy-reload-ec2

on:
  workflow_dispatch: {}

concurrency:
  group: opus-ec2-caddy-reload
  cancel-in-progress: false

jobs:
  reload-app:
    if: ${{ vars.DEPLOY_WEB_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Sync repo on app EC2 and reload Caddy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script_stop: true
          script: |
            bash -lc 'set -eo pipefail
            BR="${{ github.ref_name }}"
            APP="$HOME/opus-dev"
            if [ ! -d "$APP/.git" ]; then echo "[caddy-reload-app] missing git clone at $APP" >&2; exit 1; fi
            git -C "$APP" config --unset-all remote.origin.fetch || true
            git -C "$APP" config --add remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
            git -C "$APP" fetch --depth 1 origin "+$BR:refs/remotes/origin/$BR"
            git -C "$APP" checkout -B "$BR" "origin/$BR"
            grep -q "app.opus-store.com" "$APP/infra/caddy/Caddyfile" || { echo "[caddy-reload-app] Caddyfile missing app host"; exit 1; }
            APP_DIR="$APP" bash "$APP/scripts/ops-caddy-reload.sh"
            cd "$APP" && docker compose -f compose.web.yaml up -d --force-recreate --no-deps caddy
            sleep 12
            curl -sfI --max-time 30 "https://app.opus-store.com/" | head -n 8
            echo "[caddy-reload-app] done branch=$BR"
            '

      - name: Verify app TLS (public)
        run: |
          set -euo pipefail
          sleep 5
          echo | openssl s_client -connect app.opus-store.com:443 -servername app.opus-store.com 2>&1 | tee /tmp/ossl-app.txt
          grep -E "subject=|issuer=" /tmp/ossl-app.txt
          curl -sfI --max-time 30 "https://app.opus-store.com/" | head -n 8

  reload-console:
    if: ${{ secrets.CONSOLE_EC2_HOST != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Sync repo on console EC2 and reload Caddy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CONSOLE_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script_stop: true
          script: |
            bash -lc 'set -eo pipefail
            BR="${{ github.ref_name }}"
            APP="$HOME/opus-dev"
            if [ ! -d "$APP/.git" ]; then echo "[caddy-reload-console] missing git clone at $APP" >&2; exit 1; fi
            git -C "$APP" config --unset-all remote.origin.fetch || true
            git -C "$APP" config --add remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
            git -C "$APP" fetch --depth 1 origin "+$BR:refs/remotes/origin/$BR"
            git -C "$APP" checkout -B "$BR" "origin/$BR"
            grep -q "console.opus-store.com" "$APP/infra/caddy/Caddyfile.console" || { echo "[caddy-reload-console] Caddyfile.console missing"; exit 1; }
            cd "$APP" && docker compose -f compose.console.yaml up -d --force-recreate --no-deps caddy
            sleep 12
            echo "[caddy-reload-console] done branch=$BR"
            '

      - name: Verify console TLS (public DNS)
        run: |
          set -euo pipefail
          sleep 5
          curl -sfI --max-time 30 "https://console.opus-store.com/ko/login" | head -n 8
